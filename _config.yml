      layout: doc
      app_id: iRootWord

# i18n: list of supported languages
languages:
  - code: en
    name: English
    short: EN
  - code: zh-CN
    name: 简体中文
    short: 简
  - code: zh-TW
    name: 繁體中文
    short: 繁

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - .git
  - .DS_Store
  - "*.gemspec"
