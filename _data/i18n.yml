  hero:
    eyebrow: iHTCTeam
    title: "用心打磨。安静好用。"
    subtitle: "一家专注隐私的独立工作室，为 iPhone、iPad 和 Mac 设计精致工具。无账号、不追踪、不上传——只是尊重你时间的好软件。"
    cta_explore: 浏览全部应用
    cta_contact: 联系我们
