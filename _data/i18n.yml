    stat_hint: 了解更多
    stat_tablist: 工作室亮点
    stat_apps_title_suffix: 款精心打磨的应用
    stat_apps_desc: 从番茄钟到 App Store 浏览——每款应用均为 iPhone、iPad、Mac 原生 SwiftUI，配有独立支持页、FAQ 与隐私政策。
    stat_apps_action: 浏览全部应用 ↓
    stat_offline_title: 100% 离线优先的核心体验
    stat_offline_desc: 题库、词典、计时器与计算器等核心功能完全在设备本地运行，日常使用无需 Wi-Fi 或蜂窝网络，工具随你所至。
    stat_privacy_title: 零追踪、零广告
    stat_privacy_desc: 无分析 SDK、无广告网络、无强制账号。我们不收集你的使用数据；可选 iCloud 同步仅通过 Apple 基础设施完成。
  apps_section:
    eyebrow: 我们的应用
    title: 每个细节都用心打磨
    subtitle: 每款应用都为 Apple 平台原生而生，完全离线可用，并尊重你的隐私。点击下方任一应用查看详情。
    learn_more: 查看详情
    coming_soon: 即将推出
  values:
    eyebrow: 我们的理念
    title: 安静地把每件小事做对
    items:
      - title: 默认隐私
        desc: 不要账号、不收集数据、不接入任何第三方 SDK。所有内容都只留在你的设备上。
      - title: 原生快速
        desc: 基于 SwiftUI 为 iOS、iPadOS 和 macOS 构建，启动迅捷、节能省电。
      - title: 离线优先
        desc: 所有核心功能均可在无网络环境下使用，让你的工具陪你去任何地方。
      - title: 细节为王
        desc: 考究的排版、真实的触感、流畅的动效、完整的深色模式。每个像素都精心雕琢。
      - title: 三语贴心
        desc: 支持英文、简体中文与繁体中文，随时切换，不被系统语言所限制。
      - title: 永久无广告
        desc: 无弹窗、无广告联盟、无套路设计。我们赢得信任，而非曝光量。
  contact:
    eyebrow: 联系我们
    title: 有任何问题、建议或想法吗?
    subtitle: 我们通常会在 48 小时内回复。如果是 Bug,烦请附上设备型号与 iOS 版本。
