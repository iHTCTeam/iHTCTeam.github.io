  hero:
    eyebrow: iHTCTeam
    title: "Crafted apps. Calm software."
    subtitle: "A small studio designing privacy-first apps for iPhone, iPad and Mac. No accounts, no tracking, no cloud — just thoughtful tools that respect your time."
    cta_explore: Explore apps
    cta_contact: Get in touch
    stat_apps: Apps
    stat_offline: Offline-first
    stat_privacy: No tracking
    stat_hint: Learn more
    stat_tablist: Studio highlights
    stat_apps_title_suffix: thoughtfully crafted apps
    stat_apps_desc: From Pomodoro timers to App Store browsing — each app is native SwiftUI for iPhone, iPad, and Mac, with its own support page, FAQ, and privacy policy.
    stat_apps_action: Browse all apps ↓
    stat_offline_title: 100% offline-first core features
    stat_offline_desc: Problem banks, dictionaries, timers, and calculators run entirely on your device. No Wi-Fi or cellular needed for everyday use — your tools travel with you.
    stat_privacy_title: Zero tracking, zero ads
    stat_privacy_desc: No analytics SDKs, no ad networks, no mandatory accounts. We never collect your usage data. Optional iCloud sync uses Apple's infrastructure only.
  apps_section:
    eyebrow: Our apps
    title: Built with care, polished by detail
    subtitle: Every app is designed to feel native on Apple devices, work fully offline, and respect your privacy. Pick one to learn more.
    learn_more: Learn more
    coming_soon: Coming soon
  values:
    eyebrow: What we believe
    title: Quiet apps that earn their place
    items:
      - title: Privacy by default
        desc: No accounts, no analytics, no third-party SDKs. Your data stays on your device — always.
      - title: Native and fast
        desc: Built with SwiftUI for iOS, iPadOS and macOS. Tuned for instant launch and battery-friendly performance.
      - title: Offline-first
        desc: Every core feature works without an internet connection. Your tools should work everywhere you do.
      - title: Designed in detail
        desc: Considered typography, real haptics, fluid motion, and full Dark Mode. Pixel-craft on every screen.
      - title: Trilingual by design
        desc: English, Simplified Chinese, and Traditional Chinese — switch anytime without following system language.
      - title: Ad-free, always
        desc: No pop-ups, no ad networks, no dark patterns. We earn trust, not impressions.
  contact:
    eyebrow: Get in touch
    title: Questions, feedback, or ideas?
    subtitle: We typically respond within 48 hours. For bugs, please share your device model and iOS version.
    email_label: Email
    github_label: GitHub Issues
  footer:
    rights: All rights reserved.
    built_with: Built with care.
    select_language: Language
    select_theme: Appearance
